name: 'Terraform Apply (OIDC)'

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-oidc.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Run terraform destroy instead of apply'
        required: false
        type: boolean
        default: false
      confirm_destroy:
        description: 'Require true to execute destroy'
        required: false
        type: boolean
        default: false

env:
  TERRAFORM_VERSION: 1.5.0
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_BACKEND_RESOURCE_GROUP: ${{ secrets.ARM_BACKEND_RESOURCE_GROUP }}
  ARM_BACKEND_STORAGE_ACCOUNT: ${{ secrets.ARM_BACKEND_STORAGE_ACCOUNT }}
  ARM_BACKEND_CONTAINER: ${{ secrets.ARM_BACKEND_CONTAINER }}
  ARM_BACKEND_KEY: ${{ secrets.ARM_BACKEND_KEY }}
  ARM_USE_OIDC: true
  ARM_OIDC_TOKEN: ${{ secrets.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
  ARM_OIDC_REQUEST_URL: ${{ secrets.ACTIONS_ID_TOKEN_REQUEST_URL }}

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=$ARM_BACKEND_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$ARM_BACKEND_STORAGE_ACCOUNT" \
            -backend-config="container_name=$ARM_BACKEND_CONTAINER" \
            -backend-config="key=$ARM_BACKEND_KEY"

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: Upload TFPlan
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: tfplan
          path: ./terraform/tfplan

  terraform-apply:
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=$ARM_BACKEND_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$ARM_BACKEND_STORAGE_ACCOUNT" \
            -backend-config="container_name=$ARM_BACKEND_CONTAINER" \
            -backend-config="key=$ARM_BACKEND_KEY"

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: Confirm destroy
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.destroy == 'true' && github.event.inputs.confirm_destroy != 'true' }}
        run: |
          echo "Destroy requested but not confirmed. Set confirm_destroy=true to proceed."
          exit 1

      - name: Terraform Apply or Destroy
        working-directory: ./terraform
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.destroy }}" = "true" ]; then
            terraform destroy -auto-approve
          else
            terraform apply -auto-approve tfplan
          fi

      - name: Terraform Output
        working-directory: ./terraform
        run: terraform output -no-color
